<style>

body{font-family:'Zen Kaku Gothic New',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E")}

.section-title{font-size:11px;color:var(--text3);font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;letter-spacing:1px;text-transform:uppercase}

<script>

function load(){try{var d=localStorage.getItem(DB_KEY);if(d){var p=JSON.parse(d);p.customers.forEach(function(c){NECKS.forEach(function(n){if(c.necks&&typeof c.necks[n]==='string')c.necks[n]={s:c.necks[n],m:''};if(!c.necks)c.necks={};if(!c.necks[n])c.necks[n]={s:'未確認',m:''};});if(!c.steps)c.steps=[];if(!c.family)c.family=[];if(!c.events)c.events=[];});if(!p.staff)p.staff=[];if(!p.apiKey)p.apiKey='';if(!p.whisperKey)p.whisperKey='';if(!p.settings)p.settings={bdNotify:'both'};return p;}}catch(e){}return defaultData();}

h+='<div style="margin-bottom:18px"><div class="section-title"><span>🚦</span> ネック <div class="section-line"></div></div><div class="neck-grid" style="margin-bottom:10px">';
NECKS.forEach(function(n){var ns=c.necks[n],cls=ns.s==='解決済み'?'resolved':ns.s==='要対応'?'issue':'';h+='<div class="neck-item '+cls+'" onclick="cycleN(sel(),\''+n+'\')"><div class="neck-icon">'+NECK_I[ns.s]+'</div><div class="neck-label">'+n+'</div><div class="neck-status">'+ns.s+'</div></div>';});h+='</div>';
NECKS.forEach(function(n){if(c.necks[n].s==='未確認'&&!c.necks[n].m)return;var col=c.necks[n].s==='要対応'?'is-red':c.necks[n].s==='解決済み'?'is-green':'is-gray';h+='<div class="neck-memo-row"><div class="neck-memo-label '+col+'">'+NECK_I[c.necks[n].s]+' '+n+'</div><input class="input" style="font-size:12px;padding:8px 10px" placeholder="詳細メモ" value="'+esc(c.necks[n].m)+'" oninput="sel().necks[\''+n+'\'].m=this.value;save();"></div>';});h+='</div>';
if(c.phase==='契約済み'||c.phase==='仮契約済み'){h+='<div style="margin-bottom:18px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div class="section-title" style="margin-bottom:0"><span>📋</span> 進捗</div><button class="btn-ghost" onclick="S.showStep=true;render()">＋</button></div>';if(!c.steps.length)h+='<div style="text-align:center;padding:12px"><button class="btn btn-secondary" style="font-size:12px" onclick="addDefSteps('+c.id+')">デフォルト項目を追加</button></div>';else{var dn=c.steps.filter(function(s){return s.done;}).length,pct=Math.round(dn/c.steps.length*100);h+='<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:4px"><span>'+pct+'%</span><span>'+dn+'/'+c.steps.length+'</span></div><div class="progress-track" style="margin-bottom:12px"><div class="progress-fill" style="width:'+pct+'%"></div></div>';c.steps.forEach(function(s,i){h+='<div class="check-item" onclick="togStep(sel(),'+i+')"><div class="check-box'+(s.done?' checked':'')+'">'+(s.done?'✓':'')+'</div><div class="check-text'+(s.done?' done':'')+'">'+esc(s.name)+'</div></div>';});}h+='</div>';}
h+='<div style="margin-bottom:18px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div class="section-title" style="margin-bottom:0"><span>👨‍👩‍👧</span> 家族</div><button class="btn-ghost" onclick="S.showFam=true;render()">＋</button></div>';
if(!c.family.length)h+='<div style="color:var(--text3);font-size:12px;text-align:center;padding:12px">未登録</div>';
else c.family.forEach(function(f){h+='<div class="family-card"><div><div style="font-size:13px;font-weight:600">'+esc(f.name)+' <span style="color:var(--text3);font-size:11px">'+esc(f.relation)+'</span></div>'+(f.birthday?'<div style="font-size:11px;color:var(--text3)">'+f.birthday+' / '+age(f.birthday)+'</div>':'')+'</div>'+(f.birthday?'<button class="btn-small" style="background:var(--orange-dim);color:var(--orange);font-size:10px" onclick="event.stopPropagation();genBd(\''+esc(c.name)+'\',\''+esc(f.name)+'\',\''+esc(f.relation)+'\',\''+f.birthday+'\')">🎂</button>':'')+'</div>';});h+='</div>';
h+='<div style="margin-bottom:18px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div class="section-title" style="margin-bottom:0"><span>📅</span> イベント</div><button class="btn-ghost" onclick="S.showEvt=true;render()">＋</button></div>';
if(!c.events||!c.events.length)h+='<div style="color:var(--text3);font-size:12px;text-align:center;padding:12px">予定なし</div>';
else c.events.forEach(function(e){h+='<div style="background:var(--bg2);border-radius:8px;padding:11px 13px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--border)"><span style="font-size:13px;font-weight:600"><span style="background:var(--green-dim);color:var(--green);border-radius:5px;padding:2px 7px;font-size:10px;margin-right:8px;font-weight:700">'+esc(e.type)+'</span>'+e.date+'</span></div>';});h+='</div>';
h+='<div class="divider"></div><button class="btn btn-danger" onclick="delC('+c.id+')">この顧客を削除</button></div></div>';return h;}

function rAdd(){var nc=S.nc;var h='<div class="modal-overlay"><div class="modal"><div class="modal-handle"></div><div style="font-size:16px;font-weight:800;margin-bottom:20px">顧客を追加</div>';h+='<div class="label">名前 *</div><input class="input" style="margin-bottom:12px" placeholder="田中 雄一" oninput="S.nc.name=this.value"><div class="label">電話番号</div><input class="input" style="margin-bottom:12px" placeholder="090-1234-5678" type="tel" oninput="S.nc.phone=this.value"><div class="label">フェーズ</div><select class="input" style="margin-bottom:12px" onchange="S.nc.phase=this.value">';PHASES.forEach(function(p){h+='<option'+(nc.phase===p?' selected':'')+'>'+p+'</option>';});h+='</select><div class="label">ランク</div><div class="rank-btns" style="margin-bottom:12px">';RANKS.forEach(function(r){h+='<button class="rank-btn'+(nc.rank===r?' sel-'+r.toLowerCase():'')+'" onclick="S.nc.rank=\''+r+'\';render()">'+r+'</button>';});h+='</div><div class="label">予算</div><input class="input" style="margin-bottom:12px" placeholder="4,000万円" oninput="S.nc.budget=this.value"><div class="label">エリア</div><input class="input" style="margin-bottom:12px" placeholder="飯塚市" oninput="S.nc.area=this.value"><div class="label">土地</div><input class="input" style="margin-bottom:12px" placeholder="土地あり / 土地なし" oninput="S.nc.land=this.value"><div class="label">競合</div><input class="input" style="margin-bottom:12px" placeholder="積水ハウス" oninput="S.nc.competitor=this.value"><div class="label">初回来場日</div><input class="input" type="date" style="margin-bottom:22px" oninput="S.nc.firstVisit=this.value"><div style="display:flex;gap:10px"><button class="btn btn-secondary" style="flex:1" onclick="S.showAdd=false;S.nc=freshC();render()">キャンセル</button><button class="btn btn-primary" style="flex:1" onclick="addC()">登録</button></div></div></div>';return h;}

function rFam(){return'<div class="modal-overlay"><div class="modal"><div class="modal-handle"></div><div style="font-size:16px;font-weight:800;margin-bottom:20px">家族を追加</div><div class="label">名前 *</div><input class="input" style="margin-bottom:12px" placeholder="田中 花子" oninput="S.nf.name=this.value"><div class="label">続柄</div><input class="input" style="margin-bottom:12px" placeholder="奥様 / ご主人 / 長男" oninput="S.nf.relation=this.value"><div class="label">生年月日</div><input class="input" type="date" style="margin-bottom:22px" oninput="S.nf.birthday=this.value"><div style="display:flex;gap:10px"><button class="btn btn-secondary" style="flex:1" onclick="S.showFam=false;S.nf={name:\'\',relation:\'\',birthday:\'\'};render()">キャンセル</button><button class="btn btn-primary" style="flex:1" onclick="addFam()">追加</button></div></div></div>';}
function rEvt(){return'<div class="modal-overlay"><div class="modal"><div class="modal-handle"></div><div style="font-size:16px;font-weight:800;margin-bottom:20px">イベント追加</div><div class="label">種別 *</div><input class="input" style="margin-bottom:12px" placeholder="工場見学 / お家見学" oninput="S.ne.type=this.value"><div class="label">日付 *</div><input class="input" type="date" style="margin-bottom:22px" oninput="S.ne.date=this.value"><div style="display:flex;gap:10px"><button class="btn btn-secondary" style="flex:1" onclick="S.showEvt=false;S.ne={type:\'\',date:\'\'};render()">キャンセル</button><button class="btn btn-primary" style="flex:1" onclick="addEvt()">追加</button></div></div></div>';}
function rStp(){return'<div class="modal-overlay"><div class="modal"><div class="modal-handle"></div><div style="font-size:16px;font-weight:800;margin-bottom:20px">項目追加</div><div class="label">項目名</div><input class="input" style="margin-bottom:22px" placeholder="例：外構打ち合わせ" oninput="S.ns=this.value"><div style="display:flex;gap:10px"><button class="btn btn-secondary" style="flex:1" onclick="S.showStep=false;S.ns=\'\';render()">キャンセル</button><button class="btn btn-primary" style="flex:1" onclick="addStp()">追加</button></div></div></div>';}
render();
</script>
</body>
</html>
