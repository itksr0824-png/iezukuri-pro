/* ========== Data Migration ========== */
function migrateData(p) {
  p.customers.forEach(function(c) {
    if (!c.necks) c.necks = {};
    NECKS.forEach(function(n) {
      if (c.necks && typeof c.necks[n] === 'string') c.necks[n] = { s: c.necks[n], m: '' };
      if (!c.necks[n]) c.necks[n] = { s: '未確認', m: '' };
    });
    if (!c.steps) c.steps = [];
    if (!c.family) c.family = [];
    if (!c.events) c.events = [];
    if (typeof c.nextAction === 'string') {
      c.actions = c.nextAction ? [{ t: c.nextAction, done: false }] : [];
      delete c.nextAction;
    }
    if (!c.actions) c.actions = [];
  });
  if (!p.staff) p.staff = [];
  if (!p.apiKey) p.apiKey = '';
  if (!p.whisperKey) p.whisperKey = '';
  if (!p.settings) p.settings = { bdNotify: 'both' };
  if (!p.eventTypes) p.eventTypes = ['現場見学', '資金計画', '間取り提案', '土地案内', 'ショールーム'];
  return p;
}

/* ========== Supabase Save/Load ========== */
function sbHeaders() {
  return {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
    'Prefer': 'return=minimal'
  };
}

function saveToSupabase() {
  showSyncStatus('ing');
  var payload = { id: SB_ROW_ID, data: data, updated_at: new Date().toISOString() };
  if (sbClient) {
    sbClient.from('customers').upsert(payload).then(function(res) {
      if (res.error) { showSyncStatus('fail'); }
      else { showSyncStatus('ok'); }
    }).catch(function() { showSyncStatus('fail'); });
    return;
  }
  fetch(SUPABASE_URL + '/rest/v1/customers', {
    method: 'POST',
    headers: Object.assign({}, sbHeaders(), { 'Prefer': 'resolution=merge-duplicates,return=minimal' }),
    body: JSON.stringify(payload)
  }).then(function(r) {
    if (r.ok) { showSyncStatus('ok'); }
    else { showSyncStatus('fail'); }
  }).catch(function() { showSyncStatus('fail'); });
}

function loadFromSupabase() {
  showSyncStatus('ing');
  if (sbClient) {
    return sbClient.from('customers').select('data').eq('id', SB_ROW_ID).single().then(function(res) {
      if (res.error || !res.data || !res.data.data) { showSyncStatus('fail'); return null; }
      showSyncStatus('ok');
      return migrateData(res.data.data);
    }).catch(function() { showSyncStatus('fail'); return null; });
  }
  return fetch(SUPABASE_URL + '/rest/v1/customers?id=eq.' + SB_ROW_ID + '&select=data', {
    headers: sbHeaders()
  }).then(function(r) {
    if (!r.ok) { showSyncStatus('fail'); return null; }
    return r.json();
  }).then(function(rows) {
    if (!rows || !rows.length || !rows[0].data) { showSyncStatus('fail'); return null; }
    showSyncStatus('ok');
    return migrateData(rows[0].data);
  }).catch(function() { showSyncStatus('fail'); return null; });
}

function syncNow() {
  loadFromSupabase().then(function(sbData) {
    if (sbData) {
      data = sbData;
      try { localStorage.setItem(DB_KEY, JSON.stringify(data)); } catch (e) {}
      if (typeof render === 'function') render();
    }
  });
}

/* ========== Drag & Drop ========== */
var dragInsertIdx = -1;

function dragStart(e, idx, mode) {
  var touch = e.touches[0];
  S.dragStartY = touch.clientY; S.dragStartX = touch.clientX;
  S.dragMode = mode || 'all';
  dragInsertIdx = -1;
  S.dragTimer = setTimeout(function() {
    S.dragged = true; S.dragIdx = idx;
    var items = document.querySelectorAll('.drag-item');
    var el = items[idx]; if (!el) return;
    S.dragEl = el; el.classList.add('dragging');
    if (navigator.vibrate) navigator.vibrate(30);
    var list = document.getElementById('dragList');
    if (list) {
      list.addEventListener('touchmove', dragMove, { passive: false });
      list.addEventListener('touchend', dragEnd);
    }
  }, 400);
}

function dragMove(e) {
  if (!S.dragged) return;
  e.preventDefault();
  var touch = e.touches[0];
  var fingerY = touch.clientY;
  var items = document.querySelectorAll('.drag-item');
  var fromIdx = S.dragIdx;

  // Build list of non-dragged items with their midpoints
  var slots = [];
  for (var i = 0; i < items.length; i++) {
    if (i === fromIdx) continue;
    var r = items[i].getBoundingClientRect();
    slots.push({ domIdx: i, midY: r.top + r.height / 2 });
  }

  // Find where the finger is: which slot gap?
  // insertPos = position in the slots array where dragged item should go
  var insertPos = slots.length; // default: end
  for (var j = 0; j < slots.length; j++) {
    if (fingerY < slots[j].midY) {
      insertPos = j;
      break;
    }
  }

  // Convert insertPos back to original array index
  // slots[insertPos] is the item that will come AFTER the dragged item
  // So we insert BEFORE slots[insertPos].domIdx in DOM terms
  var gapDomIdx = -1; // which DOM item gets the gap class (gap opens above it)
  if (insertPos < slots.length) {
    gapDomIdx = slots[insertPos].domIdx;
  }

  // Calculate the actual array insert index
  // In the original array (before any removal), the dragged item is at fromIdx
  // After removing fromIdx, the remaining items are in order
  // insertPos is position among remaining items, so that's the splice index
  if (insertPos === fromIdx || (insertPos === fromIdx && gapDomIdx === -1)) {
    // No movement needed
    dragInsertIdx = -1;
  } else {
    // insertPos is the index in the "remaining items" array
    // But we need to convert to the full array index (including the dragged item)
    // If insertPos >= fromIdx, the actual full-array index is insertPos + 1
    // (because the dragged item still occupies fromIdx)
    // But since we'll splice(fromIdx,1) first then splice(insertPos,...),
    // we just store insertPos directly as the post-removal index
    dragInsertIdx = insertPos;
  }

  // Show visual gap
  items.forEach(function(it) { it.classList.remove('drag-gap'); });
  if (gapDomIdx >= 0 && gapDomIdx < items.length && dragInsertIdx >= 0) {
    items[gapDomIdx].classList.add('drag-gap');
  }

  // Move the dragged element visually
  if (S.dragEl) {
    var dy = fingerY - S.dragStartY;
    var dx = touch.clientX - S.dragStartX;
    dx = Math.max(-30, Math.min(30, dx));
    S.dragEl.style.transform = 'translate(' + dx + 'px,' + dy + 'px) rotate(' + (dx * 0.15) + 'deg)';
    S.dragEl.style.zIndex = '10';
  }
}

function dragEnd(e) {
  clearTimeout(S.dragTimer);
  if (!S.dragged) { S.dragIdx = null; return; }

  var fromIdx = S.dragIdx;
  var toIdx = dragInsertIdx; // post-removal index among visible items

  if (toIdx >= 0 && fromIdx !== null) {
    if (S.dragMode === 'phase') {
      // Phase mode: items are filtered by phase
      var filt = data.customers.filter(function(c) { return c.phase === S.phase; });
      var fromId = filt[fromIdx] ? filt[fromIdx].id : null;
      if (fromId) {
        // Remove from global array
        var cs = data.customers;
        var globalFrom = cs.findIndex(function(c) { return c.id === fromId; });
        var moved = cs.splice(globalFrom, 1)[0];

        // Build remaining filtered list to find target position
        var remaining = cs.filter(function(c) { return c.phase === S.phase; });
        var globalTarget;
        if (toIdx >= remaining.length) {
          // Insert after the last item of this phase
          var lastGlobal = -1;
          for (var k = 0; k < cs.length; k++) {
            if (cs[k].phase === S.phase) lastGlobal = k;
          }
          globalTarget = lastGlobal + 1;
        } else {
          // Insert before remaining[toIdx]
          var targetId = remaining[toIdx].id;
          globalTarget = cs.findIndex(function(c) { return c.id === targetId; });
        }
        cs.splice(globalTarget, 0, moved);
        save();
      }
    } else {
      // All mode: direct array manipulation
      var cs2 = data.customers;
      var moved2 = cs2.splice(fromIdx, 1)[0];
      cs2.splice(toIdx, 0, moved2);
      save();
    }
  }

  S.dragged = false; S.dragIdx = null; S.dragEl = null; S.dragMode = null;
  dragInsertIdx = -1;
  var list = document.getElementById('dragList');
  if (list) { list.removeEventListener('touchmove', dragMove); list.removeEventListener('touchend', dragEnd); }
  setTimeout(function() { S.dragged = false; render(); }, 50);
}

/* ========== Audio / AI ========== */
function handleAudio(inp) {

  var note = '【音声ファイル】' + f.name + '\n※ ボイスメモアプリで文字起こし後、下のテキスト欄に貼り付けてください\n\n';
  c.memo = c.memo ? note + c.memo : note;
  save(); render(); inp.value = '';
}

function transcribeAudio(inp) {
  var f = inp.files[0]; if (!f) return;
  if (!data.whisperKey) { alert('設定画面でWhisper APIキーを登録してください'); inp.value = ''; return; }
  var c = sel(); if (!c) return;
  S.transcribing = true; render();
  var fd = new FormData(); fd.append('file', f); fd.append('model', 'whisper-1'); fd.append('language', 'ja');
  fetch('https://api.openai.com/v1/audio/transcriptions', {
    method: 'POST', headers: { 'Authorization': 'Bearer ' + data.whisperKey }, body: fd
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.text) { c.memo = (c.memo ? c.memo + '\n' : '') + d.text; save(); toast('文字起こし完了'); }
    else { alert('文字起こしに失敗しました：' + (d.error ? d.error.message : '不明なエラー')); }
    S.transcribing = false; inp.value = ''; render();
  }).catch(function(ex) { S.transcribing = false; inp.value = ''; alert('エラー: ' + ex.message); render(); });
}

function buildPrompt(c) {
  var acts = (c.actions || []).filter(function(a) { return !a.done; }).map(function(a) { return a.t; }).join('、');
  return '住宅営業コーチとして分析。簡潔に箇条書き。\n\n【顧客】' + c.name + '様\n【予算】' + c.budget +
    '\n【フェーズ】' + c.phase + '\n【競合】' + (c.competitor || 'なし') + '\n【現在のアクション】' + (acts || 'なし') +
    '\n【ネック】\n' + NECKS.map(function(n) {

    }).join('\n') + '\n\n【商談メモ】\n' + c.memo +
    '\n\n■顧客の本音\n■次回アクション（優先順）\n■LINEメッセージ案\n■競合対策';
}

function analyze() {
  var c = sel(); if (!c || !c.memo || !c.memo.trim()) return;
  if (!data.apiKey) {
    var p = buildPrompt(c);
    if (navigator.clipboard) { navigator.clipboard.writeText(p).then(function() { toast('プロンプトをコピーしました'); }); }
    return;
  }
  S.analyzing = true; render();
  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages: [{ role: 'user', content: buildPrompt(c) }] })
  }).then(function(r) { return r.json(); }).then(function(d) {
    var t = d.content ? d.content.map(function(i) { return i.text || ''; }).join('\n') : '分析失敗';
    c.aiResult = t; save(); S.analyzing = false; render();
  }).catch(function() { S.analyzing = false; render(); });
}

function genBd(cn, fn, rel, bd) {

function exportD() {

/* ========== Swipe ========== */
var swipeY = 0, swipeEl = null, swipeDist = 0;

function initSwipe() {
  var modals = document.querySelectorAll('.modal');
  modals.forEach(function(m) {
    m.addEventListener('touchstart', function(e) {
      if (m.scrollTop <= 0) { swipeY = e.touches[0].clientY; swipeEl = m; swipeDist = 0; }
      else { swipeEl = null; }
    }, { passive: true });
    m.addEventListener('touchmove', function(e) {
      if (!swipeEl) return;
      swipeDist = e.touches[0].clientY - swipeY;
      if (swipeDist > 0) { swipeEl.style.transform = 'translateY(' + swipeDist + 'px)'; swipeEl.style.transition = 'none'; }
    }, { passive: true });
    m.addEventListener('touchend', function() {
      if (!swipeEl) return;
      if (swipeDist > 80) {
        swipeEl.style.transform = 'translateY(100%)'; swipeEl.style.transition = 'transform 0.2s';
        setTimeout(function() { closeDet(); S.showAdd = false; S.showFam = false; S.showEvt = false; S.showStep = false; render(); }, 200);
      } else { swipeEl.style.transform = ''; swipeEl.style.transition = 'transform 0.2s'; }
      swipeEl = null; swipeDist = 0;
    });
  });
  if (S.tab === 'customers' && !S.showDet && !S.showAdd) {
    var ct = document.querySelector('.content');
    if (ct) {
      var hSwipeX = 0;
      ct.addEventListener('touchstart', function(e) { hSwipeX = e.touches[0].clientX; }, { passive: true });
      ct.addEventListener('touchend', function(e) {
        var dx = e.changedTouches[0].clientX - hSwipeX;
        if (Math.abs(dx) < 60) return;
        var idx = PHASES.indexOf(S.phase);
        if (dx < -60 && idx < PHASES.length - 1) { S.phase = PHASES[idx + 1]; render(); }
        else if (dx > 60 && idx > 0) { S.phase = PHASES[idx - 1]; render(); }
      });
    }
  }
}

      h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">';
      h += '<div style="font-size:10px;color:var(--text3)">' + daysAgo(c.lastContact) + 'に連絡</div>';
      h += '<div class="toggle-wrap" onclick="event.stopPropagation();togUrg(data.customers.find(function(x){return x.id===' + c.id + '}))">';
      h += '<span class="toggle-label" style="color:' + (c.urgent ? 'var(--red)' : 'var(--text3)') + '">' + (c.urgent ? '要対応' : '対応済') + '</span>';
      h += '<div class="toggle ' + (c.urgent ? 'toggle-on' : 'toggle-off') + '"><div class="toggle-dot"></div></div>';
      h += '</div></div></div>';
    });
    h += '</div>';
  }
  return h;
}

      h += '<div class="drag-item" data-idx="' + ci + '" data-id="' + c.id + '" ontouchstart="dragStart(event,' + ci + ')" ontouchend="if(!S.dragged)clearTimeout(S.dragTimer)" onclick="if(!S.dragged){S.selId=' + c.id + ';render();}">' +

    });

  var c = sel(); if (!c) return '';
  h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">' +
    '<button onclick="S.selId=null;render()" class="btn-small btn-secondary">← 戻る</button>' +
    '<div style="font-weight:700;font-size:14px">' + esc(c.name) + '様</div></div>';

  h += '<button onclick="document.getElementById(\'audioUp\').click()" class="rec-btn" style="background:var(--surface2);color:var(--text2);border:1px dashed var(--border2)">📎 ボイスメモ等の音声ファイルを追加</button>' +

    '<button onclick="document.getElementById(\'audioUp2\').click()" class="btn btn-secondary" style="flex:1;font-size:12px;padding:10px">' +

    '<input type="file" id="audioUp2" accept="audio/*" style="display:none" onchange="transcribeAudio(this)"></div>';

  if (!data.whisperKey) h += '<div style="font-size:10px;color:var(--text3);text-align:center;margin-bottom:10px">設定でWhisper APIキーを登録すると音声ファイルから文字起こしできます</div>';

  h += '<textarea class="input" style="height:160px;margin-bottom:14px" placeholder="ボイスメモの文字起こしを貼り付け&#10;または商談内容を直接入力" oninput="var c=sel();if(c){c.memo=this.value;save();}">' + (c.memo ? esc(c.memo) : '') + '</textarea>';

  var ok = c.memo && c.memo.trim();
  if (data.apiKey) {
    h += '<button onclick="analyze()" ' + (S.analyzing || !ok ? 'disabled' : '') + ' class="btn btn-primary" style="margin-bottom:14px;' + (ok ? '' : 'opacity:0.4') + '">' +
      (S.analyzing ? '⏳ 分析中...' : '✨ AI分析') + '</button>';
  } else {
    h += '<button onclick="analyze()" ' + (ok ? '' : 'disabled') + ' class="btn btn-secondary" style="margin-bottom:8px;' + (ok ? '' : 'opacity:0.4') + '">📋 プロンプトをコピー → Claudeへ</button>' +
      '<div style="font-size:10px;color:var(--text3);text-align:center;margin-bottom:14px">設定でAPIキー登録→アプリ内分析可</div>';
  }

  if (c.aiResult) {
    h += '<div class="ai-result"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-left:10px">' +
      '<div style="font-size:12px;color:var(--accent);font-weight:700;letter-spacing:0.5px">✨ 分析結果</div>' +
      '<button onclick="copyAi()" class="btn-small" style="background:var(--surface2);color:var(--text2)">コピー</button></div>' +
      '<pre style="font-size:13px;white-space:pre-wrap;line-height:1.8;margin:0;font-family:inherit;padding-left:10px">' + esc(c.aiResult) + '</pre></div>';
  }
  return h;
}

/* ========== Detail Modal ========== */
function renderDetail() {
  var c = sel(); if (!c) return '';
  var h = '<div class="modal-overlay" onclick="if(event.target===this)closeDet()"><div class="modal"><div class="modal-handle"></div>';

  });
  h += '<select class="input" style="font-size:11px;padding:4px 8px;background:transparent;border:1px solid transparent;color:var(--text3);width:auto" onchange="updField(sel(),\'phase\',this.value);render()">';
  PHASES.forEach(function(p) { h += '<option' + (c.phase === p ? ' selected' : '') + '>' + p + '</option>'; });

  h += '<div style="display:flex;gap:8px;align-items:center">' +
    '<div class="toggle-wrap" onclick="togUrg(sel())"><span class="toggle-label" style="color:' + (c.urgent ? 'var(--red)' : 'var(--text3)') + ';font-size:10px">' + (c.urgent ? '要対応' : '対応済') + '</span>' +
    '<div class="toggle ' + (c.urgent ? 'toggle-on' : 'toggle-off') + '" style="width:40px;height:22px"><div class="toggle-dot" style="width:18px;height:18px"></div></div></div>' +
    '<button onclick="closeDet()" style="background:none;color:var(--text3);font-size:18px;padding:4px">✕</button></div></div>';

  // Detail grid
  h += '<div class="detail-grid" style="margin-bottom:18px">';
  [['予算','budget'],['土地','land'],['競合','competitor'],['エリア','area'],['電話','phone'],['初回来場','firstVisit']].forEach(function(f) {
    h += '<div class="detail-cell"><div class="detail-cell-label">' + f[0] + '</div>';
    if (f[1] === 'firstVisit') {
      h += '<input class="input" type="date" style="font-size:12px;padding:6px 8px;background:transparent;border:1px solid transparent" value="' + (c[f[1]] || '') + '" onfocus="this.style.borderColor=\'var(--accent)\';this.style.background=\'var(--bg)\'" onblur="this.style.borderColor=\'transparent\';this.style.background=\'transparent\'" oninput="updField(sel(),\'' + f[1] + '\',this.value)">';
    } else {
      h += '<input class="input" style="font-size:12px;font-weight:600;padding:6px 8px;background:transparent;border:1px solid transparent" value="' + esc(c[f[1]] || '') + '" placeholder="未入力" onfocus="this.style.borderColor=\'var(--accent)\';this.style.background=\'var(--bg)\'" onblur="this.style.borderColor=\'transparent\';this.style.background=\'transparent\'" oninput="updField(sel(),\'' + f[1] + '\',this.value)">';
    }
    h += '</div>';
  });
  h += '</div>';

  // Actions (Google Keep style)
  h += '<div style="margin-bottom:18px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div class="label" style="margin-bottom:0">→ アクション</div></div>';
  h += '<div style="display:flex;gap:6px;margin-bottom:10px"><input class="input" id="newActInp" style="flex:1;font-size:13px;padding:10px 12px" placeholder="新しいアクションを入力" onkeydown="if(event.key===\'Enter\'){addAct(sel(),this.value);this.value=\'\';}">';
  h += '<button onclick="var i=document.getElementById(\'newActInp\');addAct(sel(),i.value);i.value=\'\';" class="btn-small btn-primary" style="flex-shrink:0">追加</button></div>';

  var undone = (c.actions || []).filter(function(a) { return !a.done; });
  var done = (c.actions || []).filter(function(a) { return a.done; });

  if (undone.length) {
    undone.forEach(function(a) {
      var idx = (c.actions || []).indexOf(a);
      h += '<div class="check-item" style="justify-content:space-between"><div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0" onclick="togAct(sel(),' + idx + ')"><div class="check-box"></div><div class="check-text" style="overflow:hidden;text-overflow:ellipsis">' + esc(a.t) + '</div></div><button onclick="delAct(sel(),' + idx + ')" style="background:none;border:none;color:var(--text3);font-size:14px;padding:4px 6px;flex-shrink:0">✕</button></div>';
    });
  }
  if (done.length) {
    h += '<div style="font-size:10px;color:var(--text3);margin:10px 0 6px;display:flex;align-items:center;gap:6px">完了済み（' + done.length + '件）<div class="section-line"></div></div>';
    done.forEach(function(a) {
      var idx = (c.actions || []).indexOf(a);
      h += '<div class="check-item" style="opacity:0.5;justify-content:space-between"><div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0" onclick="togAct(sel(),' + idx + ')"><div class="check-box checked">✓</div><div class="check-text done" style="overflow:hidden;text-overflow:ellipsis">' + esc(a.t) + '</div></div><button onclick="delAct(sel(),' + idx + ')" style="background:none;border:none;color:var(--text3);font-size:14px;padding:4px 6px;flex-shrink:0">✕</button></div>';
    });
  }
  if (!undone.length && !done.length) h += '<div style="color:var(--text3);font-size:12px;text-align:center;padding:8px">アクションなし</div>';
  h += '</div>';

  // Necks
  h += '<div style="margin-bottom:18px"><div class="section-title"><span>🚦</span> ネック <div class="section-line"></div></div><div class="neck-grid" style="margin-bottom:10px">';
  NECKS.forEach(function(n) {
    var ns = c.necks[n], cls = ns.s === '解決済み' ? 'resolved' : ns.s === '要対応' ? 'issue' : '';
    h += '<div class="neck-item ' + cls + '" onclick="cycleN(sel(),\'' + n + '\')"><div class="neck-icon">' + NECK_I[ns.s] + '</div><div class="neck-label">' + n + '</div><div class="neck-status">' + ns.s + '</div></div>';
  });
  h += '</div>';
  NECKS.forEach(function(n) {
    if (c.necks[n].s === '未確認' && !c.necks[n].m) return;
    var col = c.necks[n].s === '要対応' ? 'is-red' : c.necks[n].s === '解決済み' ? 'is-green' : 'is-gray';
    h += '<div class="neck-memo-row"><div class="neck-memo-label ' + col + '">' + NECK_I[c.necks[n].s] + ' ' + n + '</div>' +
      '<input class="input" style="font-size:12px;padding:8px 10px" placeholder="詳細メモ" value="' + esc(c.necks[n].m) + '" oninput="sel().necks[\'' + n + '\'].m=this.value;save();"></div>';
  });
  h += '</div>';

  // Steps (契約済み・仮契約済み only)
  if (c.phase === '契約済み' || c.phase === '仮契約済み') {
    h += '<div style="margin-bottom:18px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div class="section-title" style="margin-bottom:0"><span>📋</span> 進捗</div><button class="btn-ghost" onclick="S.showStep=true;render()">＋</button></div>';
    if (!c.steps.length) {
      h += '<div style="text-align:center;padding:12px"><button class="btn btn-secondary" style="font-size:12px" onclick="addDefSteps(' + c.id + ')">デフォルト項目を追加</button></div>';
    } else {
      var dn = c.steps.filter(function(s) { return s.done; }).length;
      var pct = Math.round(dn / c.steps.length * 100);
      h += '<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:4px"><span>' + pct + '%</span><span>' + dn + '/' + c.steps.length + '</span></div>' +
        '<div class="progress-track" style="margin-bottom:12px"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
      c.steps.forEach(function(s, i) {
        h += '<div class="check-item" style="justify-content:space-between"><div style="display:flex;align-items:center;gap:10px;flex:1" onclick="togStep(sel(),' + i + ')"><div class="check-box' + (s.done ? ' checked' : '') + '">' + (s.done ? '✓' : '') + '</div><div class="check-text' + (s.done ? ' done' : '') + '">' + esc(s.name) + '</div></div><button onclick="event.stopPropagation();delStep(sel(),' + i + ')" style="background:none;border:none;color:var(--text3);font-size:14px;padding:4px 6px;flex-shrink:0">✕</button></div>';
      });
    }
    h += '</div>';
  }

  // Family
  h += '<div style="margin-bottom:18px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div class="section-title" style="margin-bottom:0"><span>👨‍👩‍👧</span> 家族</div><button class="btn-ghost" onclick="S.showFam=true;render()">＋</button></div>';
  if (!c.family.length) {
    h += '<div style="color:var(--text3);font-size:12px;text-align:center;padding:12px">未登録</div>';
  } else {
    c.family.forEach(function(f, fi) {
      h += '<div class="family-card" style="flex-direction:column;gap:8px"><div style="display:flex;justify-content:space-between;align-items:center;width:100%"><div style="display:flex;gap:6px;flex:1">' +
        '<input class="input" style="font-size:12px;padding:6px 8px;background:transparent;border:1px solid transparent;flex:1" value="' + esc(f.name) + '" placeholder="名前" onfocus="this.style.borderColor=\'var(--accent)\';this.style.background=\'var(--bg)\'" onblur="this.style.borderColor=\'transparent\';this.style.background=\'transparent\'" oninput="updFam(sel(),' + fi + ',\'name\',this.value)">' +
        '<input class="input" style="font-size:12px;padding:6px 8px;background:transparent;border:1px solid transparent;width:70px" value="' + esc(f.relation) + '" placeholder="続柄" onfocus="this.style.borderColor=\'var(--accent)\';this.style.background=\'var(--bg)\'" onblur="this.style.borderColor=\'transparent\';this.style.background=\'transparent\'" oninput="updFam(sel(),' + fi + ',\'relation\',this.value)">' +
        '</div><button onclick="delFam(sel(),' + fi + ')" style="background:none;border:none;color:var(--text3);font-size:14px;padding:4px">✕</button></div>' +
        '<div style="display:flex;gap:6px;align-items:center;width:100%">' +
        '<input class="input" type="date" style="font-size:11px;padding:5px 8px;background:transparent;border:1px solid transparent;flex:1" value="' + (f.birthday || '') + '" onfocus="this.style.borderColor=\'var(--accent)\';this.style.background=\'var(--bg)\'" onblur="this.style.borderColor=\'transparent\';this.style.background=\'transparent\'" oninput="updFam(sel(),' + fi + ',\'birthday\',this.value)">' +
        (f.birthday ? '<span style="font-size:10px;color:var(--text3);white-space:nowrap">' + age(f.birthday) + '</span>' : '') +
        (f.birthday ? '<button class="btn-small" style="background:var(--orange-dim);color:var(--orange);font-size:10px;flex-shrink:0" onclick="event.stopPropagation();genBd(\'' + esc(c.name) + '\',\'' + esc(f.name) + '\',\'' + esc(f.relation) + '\',\'' + f.birthday + '\')">🎂</button>' : '') +
        '</div></div>';
    });
  }
  h += '</div>';

  // Events
  h += '<div style="margin-bottom:18px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div class="section-title" style="margin-bottom:0"><span>📅</span> イベント</div><button class="btn-ghost" onclick="S.showEvt=true;render()">＋</button></div>';
  if (!c.events || !c.events.length) {
    h += '<div style="color:var(--text3);font-size:12px;text-align:center;padding:12px">予定なし</div>';
  } else {
    c.events.forEach(function(e, ei) {
      h += '<div style="background:var(--bg2);border-radius:8px;padding:11px 13px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--border)">' +
        '<span style="font-size:13px;font-weight:600"><span style="background:var(--green-dim);color:var(--green);border-radius:5px;padding:2px 7px;font-size:10px;margin-right:8px;font-weight:700">' + esc(e.type) + '</span>' + e.date + '</span>' +
        '<button onclick="delEvt(sel(),' + ei + ')" style="background:none;border:none;color:var(--text3);font-size:14px;padding:4px">✕</button></div>';
    });
  }
  h += '</div>';

  // Delete button
  h += '<div class="divider"></div><button class="btn btn-danger" onclick="delC(' + c.id + ')">この顧客を削除</button>';
  h += '</div></div>';
  return h;
}

  h += '</div>';
  h += '<div class="label">予算</div><input class="input" style="margin-bottom:12px" placeholder="4,000万円" value="' + esc(nc.budget) + '" oninput="S.nc.budget=this.value">';
  h += '<div class="label">エリア</div><input class="input" style="margin-bottom:12px" placeholder="飯塚市" value="' + esc(nc.area) + '" oninput="S.nc.area=this.value">';
  h += '<div class="label">土地</div><input class="input" style="margin-bottom:12px" placeholder="土地あり / 土地なし" value="' + esc(nc.land) + '" oninput="S.nc.land=this.value">';
  h += '<div class="label">競合</div><input class="input" style="margin-bottom:12px" placeholder="積水ハウス" value="' + esc(nc.competitor) + '" oninput="S.nc.competitor=this.value">';
  h += '<div class="label">初回来場日</div><input class="input" type="date" style="margin-bottom:12px" value="' + (nc.firstVisit || new Date().toISOString().split('T')[0]) + '" oninput="S.nc.firstVisit=this.value">';

  if (nc._family && nc._family.length) {
    h += '<div style="background:var(--bg2);border-radius:10px;padding:12px;margin-bottom:12px;border:1px solid var(--border)"><div class="label" style="margin-bottom:6px">👨‍👩‍👧 読み取った家族情報</div>';
    nc._family.forEach(function(f) { h += '<div style="font-size:12px;color:var(--text2);margin-bottom:2px">' + esc(f.name) + ' (' + esc(f.relation) + ')' + (f.birthday ? ' ' + f.birthday : '') + '</div>'; });
    h += '</div>';
  }
  if (nc._memo) {
    h += '<div style="background:var(--bg2);border-radius:10px;padding:12px;margin-bottom:12px;border:1px solid var(--border)"><div class="label" style="margin-bottom:4px">📝 その他メモ</div><div style="font-size:12px;color:var(--text2)">' + esc(nc._memo) + '</div></div>';
  }
  h += '<div style="display:flex;gap:10px"><button class="btn btn-secondary" style="flex:1" onclick="S.showAdd=false;S.nc=freshC();render()">キャンセル</button><button class="btn btn-primary" style="flex:1" onclick="addC()">登録</button></div>';
  h += '</div></div>';
  return h;
}

/* ========== Add Family Modal ========== */
function renderAddFamily() {
  return '<div class="modal-overlay"><div class="modal"><div class="modal-handle"></div>' +
    '<div style="font-size:16px;font-weight:800;margin-bottom:20px">家族を追加</div>' +
    '<div class="label">名前 *</div><input class="input" style="margin-bottom:12px" placeholder="サンプル 花子" oninput="S.nf.name=this.value">' +
    '<div class="label">続柄</div><input class="input" style="margin-bottom:12px" placeholder="奥様 / ご主人 / 長男" oninput="S.nf.relation=this.value">' +
    '<div class="label">生年月日</div><input class="input" type="date" style="margin-bottom:22px" oninput="S.nf.birthday=this.value">' +
    '<div style="display:flex;gap:10px"><button class="btn btn-secondary" style="flex:1" onclick="S.showFam=false;S.nf={name:\'\',relation:\'\',birthday:\'\'};render()">キャンセル</button><button class="btn btn-primary" style="flex:1" onclick="addFam()">追加</button></div>' +
    '</div></div>';
}

/* ========== Add Event Modal ========== */
function renderAddEvent() {
  var h = '<div class="modal-overlay"><div class="modal"><div class="modal-handle"></div>' +
    '<div style="font-size:16px;font-weight:800;margin-bottom:16px">イベント追加</div>' +
    '<div class="label">種別 *（タップで選択）</div>' +
    '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">';
  (data.eventTypes || []).forEach(function(t, i) {
    h += '<div style="display:flex;align-items:center;gap:0">' +
      '<button onclick="S.ne.type=\'' + esc(t) + '\';render()" style="padding:7px 12px;border-radius:8px 0 0 8px;font-size:12px;font-weight:600;border:1px solid var(--border);background:' + (S.ne.type === t ? 'var(--accent)' : 'var(--surface2)') + ';color:' + (S.ne.type === t ? 'var(--bg)' : 'var(--text2)') + '">' + esc(t) + '</button>' +
      '<button onclick="delEvtType(' + i + ')" style="padding:7px 6px;border-radius:0 8px 8px 0;font-size:10px;border:1px solid var(--border);border-left:none;background:var(--surface2);color:var(--text3)">✕</button></div>';
  });
  h += '</div>';
  h += '<div style="display:flex;gap:6px;margin-bottom:14px"><input class="input" id="newEvtType" style="flex:1;font-size:12px" placeholder="新しい種別を追加..." value="' + esc(S.ne.type || '') + '" oninput="S.ne.type=this.value">' +
    '<button onclick="var v=document.getElementById(\'newEvtType\').value;if(v.trim())addEvtType(v)" class="btn-small" style="background:var(--surface2);color:var(--accent);border:1px solid var(--border);flex-shrink:0">＋保存</button></div>';
  h += '<div class="label">日付 *</div><input class="input" type="date" style="margin-bottom:22px" value="' + (S.ne.date || '') + '" oninput="S.ne.date=this.value">';
  h += '<div style="display:flex;gap:10px"><button class="btn btn-secondary" style="flex:1" onclick="S.showEvt=false;S.ne={type:\'\',date:\'\'};render()">キャンセル</button><button class="btn btn-primary" style="flex:1" onclick="addEvt()">追加</button></div>';
  h += '</div></div>';
  return h;
}

/* ========== Add Step Modal ========== */
function renderAddStep() {
  return '<div class="modal-overlay"><div class="modal"><div class="modal-handle"></div>' +
    '<div style="font-size:16px;font-weight:800;margin-bottom:20px">項目追加</div>' +
    '<div class="label">項目名</div><input class="input" style="margin-bottom:22px" placeholder="例：外構打ち合わせ" oninput="S.ns=this.value">' +
    '<div style="display:flex;gap:10px"><button class="btn btn-secondary" style="flex:1" onclick="S.showStep=false;S.ns=\'\';render()">キャンセル</button><button class="btn btn-primary" style="flex:1" onclick="addStp()">追加</button></div>' +
    '</div></div>';
}

/* ========== Initial Render ========== */
render();
</script>
</body>
</html>
