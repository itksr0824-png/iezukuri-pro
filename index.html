<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>IEZUKURI PRO</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, 'Noto Sans JP', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
button { cursor: pointer; font-family: inherit; }
input, textarea, select { font-family: inherit; }
.tab-bar { display: flex; background: #1e293b; border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 50; }
.tab-btn { flex: 1; padding: 12px 4px; background: none; border: none; color: #64748b; font-size: 11px; border-bottom: 2px solid transparent; transition: all 0.2s; }
.tab-btn.active { color: #3b82f6; border-bottom-color: #3b82f6; font-weight: 700; }
.card { background: #1e293b; border-radius: 12px; padding: 16px; margin-bottom: 10px; }
.badge { display: inline-block; border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 700; }
.btn-primary { background: linear-gradient(135deg, #3b82f6, #06b6d4); border: none; border-radius: 10px; padding: 14px; color: white; font-weight: 700; font-size: 14px; width: 100%; }
.btn-secondary { background: #334155; border: none; border-radius: 8px; padding: 10px 16px; color: #94a3b8; font-weight: 600; font-size: 13px; }
.input { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 10px 12px; color: #e2e8f0; font-size: 13px; width: 100%; outline: none; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
.modal { background: #1e293b; border-radius: 20px 20px 0 0; padding: 24px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
.label { font-size: 11px; color: #64748b; margin-bottom: 4px; font-weight: 600; }
.section-title { font-size: 12px; color: #64748b; font-weight: 700; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.neck-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
.neck-item { background: #0f172a; border-radius: 8px; padding: 10px; text-align: center; border: 2px solid transparent; cursor: pointer; }
.neck-item.green { border-color: #22c55e; background: #052e16; }
.neck-item.yellow { border-color: #f59e0b; background: #1c1300; }
.neck-item.red { border-color: #ef4444; background: #1a0000; }
.neck-label { font-size: 12px; font-weight: 700; margin-top: 4px; }
.phase-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; }
.phase-tab { white-space: nowrap; padding: 6px 14px; border-radius: 20px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; }
.rank-s { background: #ff4444; color: white; }
.rank-a { background: #f97316; color: white; }
.rank-b { background: #3b82f6; color: white; }
.rank-c { background: #64748b; color: white; }
.stat-card { background: #1e293b; border-radius: 12px; padding: 14px; text-align: center; border-left: 3px solid; }
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #22c55e; color: white; padding: 12px 20px; border-radius: 10px; font-weight: 700; font-size: 13px; z-index: 200; white-space: nowrap; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const PHASES = ['契約済み・打ち合わせ中', '仮契約済み', '追客中', '失注・長期フォロー'];
const NECKS = ['土地', '建物', 'メーカー', '親族', '時期', 'お金'];
const NECK_STATUS = ['未確認', '要対応', '解決済み'];
const RANKS = ['S', 'A', 'B', 'C'];

const NECK_COLORS = {
‘未確認’: { cls: ‘’, icon: ‘⬜’, color: ‘#64748b’ },
‘要対応’: { cls: ‘red’, icon: ‘🔴’, color: ‘#ef4444’ },
‘解決済み’: { cls: ‘green’, icon: ‘🟢’, color: ‘#22c55e’ }
};

let state = {
tab: ‘dashboard’,
customers: [
{
id: 1, name: ‘田中 雄一’, family: [
{ name: ‘田中 花子’, relation: ‘奥様’, birthday: ‘1985-05-03’ },
{ name: ‘田中 太郎’, relation: ‘長男’, birthday: ‘2015-08-15’ }
],
phone: ‘090-1234-5678’, phase: ‘追客中’, rank: ‘S’,
budget: ‘4000万円’, land: ‘土地あり’, firstVisit: ‘2024-03-05’,
lastContact: ‘2026-03-03’, nextAction: ‘間取り提案書を送付’,
competitor: ‘積水ハウス’, urgent: true,
necks: { 土地: ‘解決済み’, 建物: ‘要対応’, メーカー: ‘要対応’, 親族: ‘解決済み’, 時期: ‘未確認’, お金: ‘要対応’ },
memo: ‘’, aiResult: ‘’, events: [{ type: ‘工場見学’, date: ‘2026-03-15’ }]
},
{
id: 2, name: ‘佐藤 美咲’, family: [{ name: ‘佐藤 健’, relation: ‘ご主人’, birthday: ‘1990-11-20’ }],
phone: ‘090-2345-6789’, phase: ‘仮契約済み’, rank: ‘A’,
budget: ‘3500万円’, land: ‘土地なし’, firstVisit: ‘2024-06-10’,
lastContact: ‘2026-02-28’, nextAction: ‘土地情報を共有する’,
competitor: ‘タマホーム’, urgent: false,
necks: { 土地: ‘要対応’, 建物: ‘解決済み’, メーカー: ‘解決済み’, 親族: ‘解決済み’, 時期: ‘要対応’, お金: ‘解決済み’ },
memo: ‘’, aiResult: ‘’, events: []
},
{
id: 3, name: ‘山本 健太’, family: [],
phone: ‘090-3456-7890’, phase: ‘失注・長期フォロー’, rank: ‘C’,
budget: ‘3000万円’, land: ‘土地なし’, firstVisit: ‘2023-11-15’,
lastContact: ‘2026-01-10’, nextAction: ‘ライフプランニングへ案内’,
competitor: ‘未確認’, urgent: true,
necks: { 土地: ‘要対応’, 建物: ‘未確認’, メーカー: ‘要対応’, 親族: ‘要対応’, 時期: ‘要対応’, お金: ‘要対応’ },
memo: ‘’, aiResult: ‘’, events: [{ type: ‘ライフプランニング’, date: ‘2026-03-20’ }]
}
],
selectedCustomer: null,
showCustomerDetail: false,
showAddCustomer: false,
showAnalyze: false,
toast: null,
phaseFilter: ‘追客中’,
isAnalyzing: false,
isRecording: false,
recordingTime: 0,
newCustomer: { name: ‘’, phone: ‘’, phase: ‘追客中’, rank: ‘A’, budget: ‘’, land: ‘土地なし’, competitor: ‘’, firstVisit: ‘’, necks: { 土地: ‘未確認’, 建物: ‘未確認’, メーカー: ‘未確認’, 親族: ‘未確認’, 時期: ‘未確認’, お金: ‘未確認’ } }
};

let recognition = null;
let timer = null;
let finalTranscript = ‘’;

function setState(updates) {
Object.assign(state, updates);
render();
}

function showToast(msg) {
setState({ toast: msg });
setTimeout(() => setState({ toast: null }), 3000);
}

function daysSince(dateStr) {
if (!dateStr) return ‘-’;
const diff = Math.floor((new Date() - new Date(dateStr)) / 86400000);
if (diff === 0) return ‘今日’;
if (diff === 1) return ‘昨日’;
return diff + ‘日前’;
}

function getNeckSummary(necks) {
const counts = { ‘解決済み’: 0, ‘要対応’: 0, ‘未確認’: 0 };
Object.values(necks).forEach(v => counts[v]++);
return counts;
}

function startRecording() {
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SR) { alert(‘音声認識非対応のブラウザです。ChromeまたはSafariをお使いください。’); return; }
recognition = new SR();
recognition.lang = ‘ja-JP’;
recognition.continuous = true;
recognition.interimResults = true;
finalTranscript = state.selectedCustomer?.memo || ‘’;

recognition.onresult = (e) => {
let interim = ‘’;
let newFinal = ‘’;
for (let i = e.resultIndex; i < e.results.length; i++) {
if (e.results[i].isFinal) newFinal += e.results[i][0].transcript;
else interim += e.results[i][0].transcript;
}
if (newFinal) finalTranscript += newFinal;
if (state.selectedCustomer) {
const updated = state.customers.map(c => c.id === state.selectedCustomer.id ? { …c, memo: finalTranscript + interim } : c);
setState({ customers: updated, selectedCustomer: { …state.selectedCustomer, memo: finalTranscript + interim } });
}
};

recognition.onerror = (e) => { if (e.error === ‘not-allowed’) alert(‘マイクの使用を許可してください。’); stopRecording(); };
recognition.start();
setState({ isRecording: true, recordingTime: 0 });
timer = setInterval(() => setState({ recordingTime: state.recordingTime + 1 }), 1000);
}

function stopRecording() {
recognition?.stop();
recognition = null;
clearInterval(timer);
setState({ isRecording: false });
}

function formatTime(sec) {
return `${Math.floor(sec / 60).toString().padStart(2, '0')}:${(sec % 60).toString().padStart(2, '0')}`;
}

async function analyzeVoiceMemo() {
if (!state.selectedCustomer?.memo?.trim()) return;
setState({ isAnalyzing: true });
const c = state.selectedCustomer;
try {
const res = await fetch(‘https://api.anthropic.com/v1/messages’, {
method: ‘POST’,
headers: { ‘Content-Type’: ‘application/json’ },
body: JSON.stringify({
model: ‘claude-sonnet-4-20250514’,
max_tokens: 1000,
messages: [{
role: ‘user’,
content: `あなたは住宅営業のコーチです。以下の商談メモを分析して日本語で回答してください。

顧客情報：

- 名前：${c.name}様
- 予算：${c.budget}
- 土地：${c.land}
- フェーズ：${c.phase}
- 競合：${c.competitor}
- ネック状況：${Object.entries(c.necks).map(([k,v]) => k + ‘:’ + v).join(’、’)}

商談メモ：${c.memo}

以下の形式で出力してください：
【顧客の本音・潜在ニーズ】
・

【次回アクション（優先順位順）】
1.
2.
3.

【今すぐ送るべきLINE文面】
（自然でプッシュしすぎない文章）

【競合対策】
・`
}]
})
});
const data = await res.json();
const result = data.content?.map(i => i.text || ‘’).join(’\n’) || ‘分析できませんでした’;
const updated = state.customers.map(c2 => c2.id === c.id ? { …c2, aiResult: result } : c2);
setState({ customers: updated, selectedCustomer: { …c, aiResult: result }, isAnalyzing: false });
} catch {
setState({ isAnalyzing: false });
alert(‘エラーが発生しました。もう一度お試しください。’);
}
}

function updateNeck(neckName) {
const c = state.selectedCustomer;
if (!c) return;
const current = c.necks[neckName];
const idx = NECK_STATUS.indexOf(current);
const next = NECK_STATUS[(idx + 1) % NECK_STATUS.length];
const newNecks = { …c.necks, [neckName]: next };
const updated = state.customers.map(cu => cu.id === c.id ? { …cu, necks: newNecks } : cu);
setState({ customers: updated, selectedCustomer: { …c, necks: newNecks } });
}

function addCustomer() {
const nc = state.newCustomer;
if (!nc.name.trim()) { alert(‘名前を入力してください’); return; }
const newC = { …nc, id: Date.now(), family: [], memo: ‘’, aiResult: ‘’, events: [], urgent: false, lastContact: new Date().toISOString().split(‘T’)[0] };
setState({ customers: […state.customers, newC], showAddCustomer: false, newCustomer: { name: ‘’, phone: ‘’, phase: ‘追客中’, rank: ‘A’, budget: ‘’, land: ‘土地なし’, competitor: ‘’, firstVisit: ‘’, necks: { 土地: ‘未確認’, 建物: ‘未確認’, メーカー: ‘未確認’, 親族: ‘未確認’, 時期: ‘未確認’, お金: ‘未確認’ } } });
showToast(‘✅ 顧客を登録しました’);
}

// ========== RENDER ==========

function renderDashboard() {
const urgent = state.customers.filter(c => c.urgent);
const today = new Date().toISOString().split(‘T’)[0];
const upcomingEvents = state.customers.flatMap(c => (c.events || []).map(e => ({ …e, customerName: c.name }))).filter(e => e.date >= today).sort((a, b) => a.date.localeCompare(b.date)).slice(0, 5);
const birthdays = [];
state.customers.forEach(c => {
(c.family || []).forEach(f => {
if (!f.birthday) return;
const bd = new Date(f.birthday);
const thisYear = new Date(new Date().getFullYear(), bd.getMonth(), bd.getDate());
const diff = Math.floor((thisYear - new Date()) / 86400000);
if (diff >= 0 && diff <= 7) birthdays.push({ customerName: c.name, familyName: f.name, relation: f.relation, daysLeft: diff });
});
});

return `
<div style="padding:16px">
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px">
<div class="stat-card" style="border-color:#3b82f6">
<div style="font-size:22px">👥</div>
<div style="font-size:26px;font-weight:700;color:#3b82f6">${state.customers.length}</div>
<div style="font-size:11px;color:#64748b">総顧客数</div>
</div>
<div class="stat-card" style="border-color:#ef4444">
<div style="font-size:22px">⚡</div>
<div style="font-size:26px;font-weight:700;color:#ef4444">${urgent.length}</div>
<div style="font-size:11px;color:#64748b">要対応</div>
</div>
<div class="stat-card" style="border-color:#22c55e">
<div style="font-size:22px">📅</div>
<div style="font-size:26px;font-weight:700;color:#22c55e">${upcomingEvents.length}</div>
<div style="font-size:11px;color:#64748b">直近イベント</div>
</div>
</div>

```
  ${birthdays.length > 0 ? `
  <div class="section-title">🎂 今週の誕生日</div>
  ${birthdays.map(b => `
    <div class="card" style="border-left:3px solid #f59e0b;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:700;font-size:13px">${b.customerName}様 / ${b.familyName}（${b.relation}）</div>
          <div style="font-size:11px;color:#f59e0b;margin-top:2px">${b.daysLeft === 0 ? '🎉 今日が誕生日！' : `あと${b.daysLeft}日`}</div>
        </div>
        <button onclick="generateBirthdayMessage('${b.customerName}', '${b.familyName}', '${b.relation}')" style="background:#1e3a5f;border:none;border-radius:8px;padding:6px 10px;color:#60a5fa;font-size:11px;font-weight:700">LINE生成</button>
      </div>
    </div>
  `).join('')}
  ` : ''}

  <div class="section-title" style="margin-top:16px">⚡ 要対応顧客</div>
  ${urgent.length === 0 ? '<div style="color:#475569;font-size:13px;text-align:center;padding:16px">要対応なし</div>' :
    urgent.map(c => `
    <div class="card" style="border-left:3px solid #ef4444;cursor:pointer" onclick="openCustomer(${c.id})">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:700;margin-bottom:4px">${c.name}様 <span class="badge rank-${c.rank.toLowerCase()}">${c.rank}</span></div>
          <div style="font-size:12px;color:#94a3b8">→ ${c.nextAction}</div>
        </div>
        <div style="font-size:11px;color:#64748b">${daysSince(c.lastContact)}</div>
      </div>
      <div style="display:flex;gap:4px;margin-top:8px;flex-wrap:wrap">
        ${NECKS.map(n => `<span style="font-size:16px" title="${n}:${c.necks[n]}">${NECK_COLORS[c.necks[n]].icon}</span>`).join('')}
      </div>
    </div>
  `).join('')}

  <div class="section-title" style="margin-top:16px">📅 直近イベント</div>
  ${upcomingEvents.length === 0 ? '<div style="color:#475569;font-size:13px;text-align:center;padding:16px">予定なし</div>' :
    upcomingEvents.map(e => `
    <div class="card" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div>
        <span class="badge" style="background:#1e3a5f;color:#60a5fa;margin-right:6px">${e.type}</span>
        <span style="font-size:13px">${e.customerName}様</span>
      </div>
      <div style="font-size:12px;color:#64748b">${e.date}</div>
    </div>
  `).join('')}
</div>
```

`;
}

function renderCustomers() {
const filtered = state.customers.filter(c => c.phase === state.phaseFilter);

return `
<div style="padding:16px">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
<div class="section-title" style="margin:0">顧客一覧</div>
<button onclick="setState({showAddCustomer:true})" style="background:linear-gradient(135deg,#3b82f6,#06b6d4);border:none;border-radius:8px;padding:6px 12px;color:white;font-size:12px;font-weight:700">＋ 追加</button>
</div>

```
  <div class="phase-tabs">
    ${PHASES.map(p => `
      <button class="phase-tab" onclick="setState({phaseFilter:'${p}'})"
        style="background:${state.phaseFilter === p ? 'linear-gradient(135deg,#3b82f6,#06b6d4)' : '#1e293b'};color:${state.phaseFilter === p ? 'white' : '#64748b'};border:none">
        ${p}（${state.customers.filter(c => c.phase === p).length}）
      </button>
    `).join('')}
  </div>

  ${filtered.length === 0 ? '<div style="color:#475569;font-size:13px;text-align:center;padding:32px">顧客なし</div>' :
    filtered.map(c => {
      const neckSummary = getNeckSummary(c.necks);
      return `
      <div class="card" style="cursor:pointer;border-left:3px solid ${c.urgent ? '#ef4444' : '#1e293b'}" onclick="openCustomer(${c.id})">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div>
            <span style="font-weight:700;font-size:15px">${c.name}様</span>
            <span class="badge rank-${c.rank.toLowerCase()}" style="margin-left:6px">${c.rank}</span>
            ${c.urgent ? '<span class="badge" style="background:#ef4444;margin-left:4px">要対応</span>' : ''}
          </div>
          <div style="font-size:11px;color:#64748b">${daysSince(c.lastContact)}</div>
        </div>
        <div style="font-size:12px;color:#94a3b8;margin-bottom:8px">→ ${c.nextAction}</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px">
          ${NECKS.map(n => `
            <div style="display:flex;align-items:center;gap:2px">
              <span style="font-size:10px;color:#64748b">${n}</span>
              <span style="font-size:14px">${NECK_COLORS[c.necks[n]].icon}</span>
            </div>
          `).join('')}
        </div>
        <div style="font-size:11px;color:#64748b">
          🔴${neckSummary['要対応']} 🟢${neckSummary['解決済み']} ⬜${neckSummary['未確認']}
          　競合：${c.competitor}
        </div>
      </div>
    `;
    }).join('')}
</div>
```

`;
}

function renderAnalyze() {
const c = state.selectedCustomer;
if (!c) return `<div style="padding:32px;text-align:center"> <div style="font-size:40px;margin-bottom:16px">🎙️</div> <div style="color:#64748b;margin-bottom:20px">顧客を選んで商談メモを分析します</div> <div style="display:flex;flex-direction:column;gap:8px"> ${state.customers.map(cu =>`
<button onclick=“setState({selectedCustomer:${JSON.stringify(cu).replace(/”/g, ‘"’)}});setState({tab:‘analyze’})”
style=“background:#1e293b;border:none;border-radius:10px;padding:14px;color:#e2e8f0;font-size:14px;font-weight:600;text-align:left”>
${cu.name}様 <span style="color:#64748b;font-size:12px">/ ${cu.phase}</span>
</button>
`).join('')} </div> </div> `;

return `
<div style="padding:16px">
<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
<button onclick="setState({selectedCustomer:null})" style="background:#334155;border:none;border-radius:8px;padding:6px 10px;color:#94a3b8;font-size:12px">← 戻る</button>
<div style="font-weight:700">${c.name}様の商談分析</div>
</div>

```
  <button onclick="${state.isRecording ? 'stopRecording()' : 'startRecording()'}"
    style="width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
    background:${state.isRecording ? 'linear-gradient(135deg,#ef4444,#dc2626)' : 'linear-gradient(135deg,#22c55e,#16a34a)'};
    border:none;border-radius:12px;padding:15px;color:white;font-weight:700;font-size:14px;margin-bottom:10px;
    box-shadow:${state.isRecording ? '0 0 20px rgba(239,68,68,0.4)' : '0 0 16px rgba(34,197,94,0.3)'}">
    ${state.isRecording
      ? `<span style="width:12px;height:12px;background:white;border-radius:2px;display:inline-block"></span> 録音停止 ${formatTime(state.recordingTime)}`
      : '🎙️ タップして録音開始（自動でテキスト化）'}
  </button>

  ${state.isRecording ? `
    <div style="background:#1a0000;border:1px solid #ef4444;border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:8px">
      <span style="width:8px;height:8px;background:#ef4444;border-radius:50%;display:inline-block"></span>

function openCustomer(id) {
const c = state.customers.find(cu => cu.id === id);
if (c) setState({ selectedCustomer: c, showCustomerDetail: true });
}

function updateMemo(val) {
if (!state.selectedCustomer) return;
const updated = state.customers.map(c => c.id === state.selectedCustomer.id ? { …c, memo: val } : c);
state.customers = updated;
state.selectedCustomer = { …state.selectedCustomer, memo: val };
}

function render() {
const app = document.getElementById(‘app’);
const tabContent = state.tab === ‘dashboard’ ? renderDashboard() : state.tab === ‘customers’ ? renderCustomers() : renderAnalyze();
